# projects.yaml — Hanni project manifest
#
# Карта артефактов: проект → файлы, таблицы, миграции, memory-заметки.
# Цель: один Read этого файла → точное знание, что относится к проекту.
# Не пытайся выводить структуру через grep — используй этот файл как single source of truth.
#
# ──────────── Schema ────────────
#   <project>:
#     description:  одна строка о назначении проекта
#     files:        [пути от ~/hanni/ для JS/CSS/HTML/Python/JSON/etc.]
#     rust:         [пути src-tauri/src/...]
#     android:      [Kotlin / Gradle / Android-resource пути]
#     tables:       [имена SQLite-таблиц]
#     migrations:   [имена migrate_* функций в desktop/src-tauri/src/db.rs]
#     subprojects:  { <name>: { ...те же поля... } }
#     memory:       [пути от memory/ без leading slash]
#     related:      [имена других проектов — двусторонние ссылки]
#
# Миграции в Hanni не отдельные .sql-файлы — это функции `migrate_*` внутри db.rs,
# вызываемые последовательно из lib.rs::run() → init_database().
#
# ──────────── Lazy-load protocol ────────────
# 1. Пользователь упомянул проект → сначала Read projects.yaml
# 2. Найди секцию → точечный Read нужных артефактов
# 3. Правка `_shared` файла → предупреди о затронутых проектах
#
# ──────────── Maintenance ────────────
# При создании нового файла — обнови манифест той же задачей.
# При удалении — удали запись.

_meta:
  version: 2
  bootstrap_status: complete
  bootstrap_date: 2026-05-25
  coverage: "416 tracked файлов покрыты (без docs/, .claude/, .github/, _dead)"
  conventions:
    migrations: "migrations: [...] — имена функций migrate_* в db.rs, не файлы"
    cross_cutting: "Файл, обслуживающий несколько проектов, кладётся в самый родной + указывается в related второго"
    folder_claude_md: "desktop/src/CLAUDE.md, desktop/src-tauri/CLAUDE.md и т.п. — folder-level rules, в _shared.docs"

