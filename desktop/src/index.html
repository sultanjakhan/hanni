<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' asset: http://asset.localhost; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' asset: http://asset.localhost data: blob:; connect-src 'self' ipc: http://ipc.localhost http://127.0.0.1:8234 http://127.0.0.1:8235 http://127.0.0.1:8236 http://127.0.0.1:8237 ws://127.0.0.1:1430 ws://127.0.0.1:1431; media-src 'self' asset: http://asset.localhost blob:; worker-src 'self' blob:; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'">
<title>Hanni</title>
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('hanni_theme') || 'light')</script>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="hljs-theme.css">
<script src="highlight.min.js"></script>
<script src="marked.min.js"></script>
</head>
<body>
<!-- Drag region for window controls -->
<div id="drag-region"></div>

<!-- Tab add dropdown -->
<div id="tab-dropdown" class="hidden">
  <input id="tab-dropdown-search" type="text" placeholder="Поиск…" />
  <div id="tab-dropdown-list"></div>
</div>

<div id="app-body">
  <!-- Mobile top header with hamburger -->
  <div id="mobile-header">
    <button id="mobile-hamburger" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span id="mobile-title">Hanni</span>
  </div>

  <!-- Left vertical tab bar (drawer on mobile) -->
  <div id="tab-bar">
    <div id="tab-list"></div>
    <button id="tab-add" title="Открыть вкладку">+</button>
    <div id="tab-bar-bottom"></div>
  </div>

  <!-- Chat sub-sidebar (only for chat) -->
  <div id="sub-sidebar" class="hidden">
    <div id="sub-sidebar-items"></div>
    <div id="sub-sidebar-goals" class="sub-sidebar-section hidden">
      <div class="sub-sidebar-section-title" id="goals-toggle">Goals</div>
      <div id="goals-list" class="hidden"></div>
    </div>
    <div id="sub-sidebar-settings" class="sub-sidebar-bottom"></div>
  </div>

  <!-- Main content area -->
  <div id="content-area">
    <!-- Chat view -->
    <div id="view-chat" class="view active">
      <div id="chat-container">
        <div id="conversations-panel">
          <div id="conv-header">
            <button id="new-chat-btn" title="Новый чат">+ Новый чат</button>
          </div>
          <div id="conv-search-box">
            <input id="conv-search" type="text" placeholder="Поиск..." autocomplete="off">
          </div>
          <div id="conv-list"></div>
        </div>
        <div id="chat-main">
          <div id="chat"></div>
          <button id="scroll-bottom-btn" title="К последним сообщениям">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
      </div>
      <div id="chat-settings-content" class="tab-content"></div>
      <div id="attach-preview"></div>
      <div id="input-area">
        <div id="input-wrapper">
          <button id="input-plus-btn" title="Инструменты">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <div id="input-pills"></div>
          <input id="file-input" type="file" style="display:none">
          <textarea id="input" placeholder="Напиши сообщение..." autocomplete="off" rows="1"></textarea>
          <button id="stop-tts" class="hidden" title="Остановить озвучку">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="4" y="4" width="8" height="8" rx="1" fill="currentColor"/></svg>
          </button>
          <button id="record" title="Удерживайте для записи">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a2.5 2.5 0 00-2.5 2.5v4a2.5 2.5 0 005 0v-4A2.5 2.5 0 008 1z" stroke="currentColor" stroke-width="1.5"/><path d="M4 7.5a4 4 0 008 0M8 13v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button id="call-btn" title="Режим звонка">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14.2 11.35l-2.45-.7a1.13 1.13 0 00-1.12.32l-1.08 1.08a8.63 8.63 0 01-4.6-4.6l1.08-1.08a1.13 1.13 0 00.32-1.12l-.7-2.45A1.13 1.13 0 004.56 2H2.88A1.13 1.13 0 001.76 3.2 12.24 12.24 0 0012.8 14.24a1.13 1.13 0 001.2-1.12v-1.68a1.13 1.13 0 00-.8-1.09z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="send">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13V3l11 5-11 5z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Generic content views (rendered dynamically) -->
    <div id="view-dashboard" class="view"><div id="dashboard-content" class="tab-content"></div></div>
    <div id="view-calendar" class="view"><div id="calendar-content" class="tab-content"></div></div>
    <div id="view-focus" class="view"><div id="focus-content" class="tab-content"></div></div>
    <div id="view-notes" class="view"><div id="notes-content" class="tab-content"></div></div>
    <div id="view-jobs" class="view"><div id="jobs-content" class="tab-content"></div></div>
    <div id="view-projects" class="view"><div id="projects-content" class="tab-content"></div></div>
    <div id="view-development" class="view"><div id="development-content" class="tab-content"></div></div>
    <div id="view-hobbies" class="view"><div id="hobbies-content" class="tab-content"></div></div>
    <div id="view-home" class="view"><div id="home-content" class="tab-content"></div></div>
    <div id="view-sports" class="view"><div id="sports-content" class="tab-content"></div></div>
    <div id="view-health" class="view"><div id="health-content" class="tab-content"></div></div>
    <div id="view-mindset" class="view"><div id="mindset-content" class="tab-content"></div></div>
    <div id="view-food" class="view"><div id="food-content" class="tab-content"></div></div>
    <div id="view-money" class="view"><div id="money-content" class="tab-content"></div></div>
    <div id="view-people" class="view"><div id="people-content" class="tab-content"></div></div>
    <div id="view-schedule" class="view"><div id="schedule-content" class="tab-content"></div></div>
    <div id="view-dankoe" class="view"><div id="dankoe-content" class="tab-content"></div></div>
    <div id="view-timeline" class="view"><div id="timeline-content" class="tab-content"></div></div>
  </div>
</div>
<!-- Call Mode Overlay -->
<div id="call-overlay" class="hidden">
  <div class="call-overlay-content">
    <div class="call-pulse-container">
      <div class="call-pulse-ring"></div>
      <div class="call-pulse-ring call-pulse-ring-2"></div>
      <div class="call-pulse-core"></div>
    </div>
    <div id="call-waveform" class="call-waveform">
      <div class="call-wave-bar"></div><div class="call-wave-bar"></div><div class="call-wave-bar"></div>
      <div class="call-wave-bar"></div><div class="call-wave-bar"></div><div class="call-wave-bar"></div>
      <div class="call-wave-bar"></div><div class="call-wave-bar"></div><div class="call-wave-bar"></div>
    </div>
    <div id="call-phase-text" class="call-phase-text">Слушаю...</div>
    <div id="call-duration" class="call-duration">0:00</div>
    <div id="call-status-hint" class="call-status-hint"></div>
    <div id="call-transcript-area" class="call-transcript-area"></div>
    <button id="call-end-btn" class="call-end-btn" title="Завершить звонок">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 002.59 3.4z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>
</div>
<script src="vendor/editorjs.min.js"></script>
<script src="vendor/header.min.js"></script>
<script src="vendor/list.min.js"></script>
<script src="vendor/checklist.min.js"></script>
<script src="vendor/quote.min.js"></script>
<script src="vendor/code.min.js"></script>
<script src="vendor/delimiter.min.js"></script>
<script src="vendor/marker.min.js"></script>
<script src="vendor/inline-code.min.js"></script>
<script src="vendor/drag-drop.min.js"></script>
<script src="vendor/three-bundle.min.js"></script>
<script src="vendor/html2canvas.min.js"></script>
<script src="js/recipe-shared.js?v=1"></script>
<script src="js/fridge-shared.js?v=1"></script>
<script type="module" src="main.js?v=279"></script>

</body>
</html>
