<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #191919; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #191919;
    border-radius: 0;
    cursor: move;
    user-select: none;
    -webkit-app-region: drag;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4F9768;
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .title {
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }
  .timer {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .stop-btn {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .stop-btn:hover { color: #E06C75; background: rgba(224,108,117,0.15); }
  .idle { display: none; color: rgba(255,255,255,0.4); font-size: 12px; padding: 16px; text-align: center; }
  .idle.visible { display: block; }
</style>
</head>
<body>
<div class="pill" id="pill" style="display:none;">
  <span class="dot"></span>
  <span class="title" id="overlay-title">...</span>
  <span class="timer" id="overlay-timer">00:00</span>
  <button class="stop-btn" id="overlay-stop" title="Stop">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
  </button>
</div>
<div class="idle" id="idle-msg">No active focus</div>

<script>
  const { invoke, event } = window.__TAURI__;
  const { listen, emit } = event;

  const pill = document.getElementById('pill');
  const idleMsg = document.getElementById('idle-msg');
  const titleEl = document.getElementById('overlay-title');
  const timerEl = document.getElementById('overlay-timer');
  let timerInterval = null;

  function startTimer(startedAt) {
    if (timerInterval) clearInterval(timerInterval);
    const start = new Date(startedAt).getTime();
    function tick() {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      const h = Math.floor(elapsed / 3600);
      const m = Math.floor((elapsed % 3600) / 60);
      const s = elapsed % 60;
      timerEl.textContent = h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    tick();
    timerInterval = setInterval(tick, 1000);
  }

  function showActive(title, startedAt) {
    titleEl.textContent = title || 'Focus';
    startTimer(startedAt);
    pill.style.display = 'flex';
    idleMsg.classList.remove('visible');
  }

  function showIdle() {
    pill.style.display = 'none';
    idleMsg.classList.add('visible');
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  // Listen for focus state from main window
  listen('focus-state', (ev) => {
    const { active, title, started_at } = ev.payload;
    if (active) showActive(title, started_at);
    else showIdle();
  });

  // Stop button
  document.getElementById('overlay-stop').addEventListener('click', async () => {
    try {
      await invoke('stop_activity');
      emit('focus-state', { active: false });
      showIdle();
    } catch (e) { console.error(e); }
  });

  // Init: poll current activity
  (async () => {
    try {
      const activity = await invoke('get_current_activity');
      if (activity && activity.id) {
        showActive(activity.title, activity.started_at);
      } else {
        showIdle();
      }
    } catch (_) { showIdle(); }
  })();
</script>
</body>
</html>
