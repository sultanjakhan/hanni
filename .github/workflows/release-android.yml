name: Release Android

on:
  push:
    tags:
      - 'v*'

jobs:
  release-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27.2.12479018
        run: sdkmanager "ndk;27.2.12479018"

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: android

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/hanni-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/hanni-release.jks" >> "$GITHUB_ENV"

      - name: Build signed APK (release)
        working-directory: desktop
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: npx tauri android build --apk

      - name: Wait for release to exist (release.yml creates it)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for i in $(seq 1 60); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists"
              exit 0
            fi
            echo "Release $TAG not yet — waiting (attempt $i/60)"
            sleep 15
          done
          echo "Release $TAG never appeared, creating empty release"
          gh release create "$TAG" --title "Hanni $TAG" --notes "See assets for download."

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          APK=desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
          if [ ! -f "$APK" ]; then
            APK=$(find desktop/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | grep -v unsigned | head -1)
          fi
          ls -la "$APK"
          gh release upload "$TAG" "$APK#hanni-${VERSION}-android.apk" --clobber
