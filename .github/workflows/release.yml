name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: brew install cmake

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_GITHUB_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hanni ${{ github.ref_name }}'
          releaseBody: 'See the assets for download.'
          releaseDraft: false
          prerelease: false
          projectPath: desktop
        # tauri-action publishes the release with the latest.json asset; the
        # updater reads it directly via .../releases/latest/download/latest.json
        # (see tauri.conf.json). No gist mirror step — that separate API call was
        # a silent single point of failure (rate-limit/PAT could freeze updates).

      # OTA web-asset bundle: HTML/JS/CSS only (excludes the big rarely-changing
      # sounds/ + assets/, which fall back to the embedded copies per-file). Both
      # macOS and Android read this same web-manifest.json from releases/latest,
      # so it's published ONCE here (the desktop job, which creates the release)
      # — NOT also from release-android.yml: two `tar` runs embed different
      # mtimes → different sha256 → a --clobber race could leave a bundle whose
      # bytes don't match the manifest sha. Web-only pushes use the same logic in
      # scripts/publish-web-update.sh.
      - name: Build + upload web-asset bundle (seed web OTA channel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BUNDLE="web-${VERSION}.tar.gz"
          tar czf "$BUNDLE" -C desktop/src --exclude=./sounds --exclude=./assets .
          SHA=$(shasum -a 256 "$BUNDLE" | cut -d' ' -f1)
          # min_native = this release: the bundle is built against this native
          # shell, so it's the safe floor (older shells get the full update).
          printf '{"web_version":"%s","min_native_version":"%s","sha256":"%s","asset":"%s"}\n' \
            "$VERSION" "$VERSION" "$SHA" "$BUNDLE" > web-manifest.json
          ls -la "$BUNDLE" web-manifest.json
          gh release upload "$TAG" "$BUNDLE" web-manifest.json --clobber
