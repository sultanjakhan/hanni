name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies
        run: brew install cmake

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_GITHUB_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hanni ${{ github.ref_name }}'
          releaseBody: 'See the assets for download.'
          releaseDraft: false
          prerelease: false
          projectPath: desktop

      - name: Update gist with latest.json
        # GIST_PAT should live on a LOW-TRAFFIC account (not the one running
        # github-sync) so the release isn't starved by the sync loop's 5000/hr.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.UPDATER_GIST_ID }}
        run: |
          TAG="${{ github.ref_name }}"

          # Download original latest.json from release (has direct download URLs)
          RELEASE=$(gh api repos/${{ github.repository }}/releases/tags/$TAG)
          LATEST_ASSET_ID=$(echo "$RELEASE" | jq -r '.assets[] | select(.name=="latest.json") | .id')
          gh api repos/${{ github.repository }}/releases/assets/$LATEST_ASSET_ID -H "Accept: application/octet-stream" > /tmp/latest.json

          # Push to the updater gist with retry/backoff: the GIST_PAT account can
          # transiently hit its API rate limit, which silently freezes prod
          # auto-updates (the updater reads only this gist).
          for i in 1 2 3 4 5; do
            if GH_TOKEN="$GIST_PAT" gh gist edit "$GIST_ID" -f latest.json /tmp/latest.json; then
              echo "gist updated to $TAG (attempt $i)"
              exit 0
            fi
            echo "gist edit failed (attempt $i), retrying in $((10 * i))s..."
            sleep $((10 * i))
          done
          echo "::error::gist update failed after 5 attempts — prod will not auto-update (GIST_PAT rate-limited?)"
          exit 1
