<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#37352f">
  <title>Hanni · общий доступ</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2337352f'/%3E%3Ctext x='50' y='68' font-size='62' text-anchor='middle' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-weight='700' fill='%23ffffff'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2337352f'/%3E%3Ctext x='50' y='68' font-size='62' text-anchor='middle' font-family='-apple-system' font-weight='700' fill='%23ffffff'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/guest.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr-logo">H</div>
    <div>
      <div class="hdr-title" id="hdr-title">Hanni</div>
      <div class="hdr-sub">Hanni · общий доступ</div>
    </div>
  </header>
  <main id="app"><div class="muted">Загрузка…</div></main>
  <footer class="ftr">powered by Hanni · cloud</footer>

  <!-- Static-hosted bootstrap. Firestore project + Web API key are public
       (rules enforce per-token access). Token comes from the URL pathname:
       /s/<token>. The share_links/<token> document gives us scope, perms,
       label, and tunnel_url (where to POST writes when the host is on). -->
  <script src="/firebase-config.js"></script>
  <script>
  (async function () {
    const app = document.getElementById('app');
    const m = location.pathname.match(/\/s\/([A-Za-z0-9_-]{8,64})/);
    if (!m) {
      app.innerHTML = '<div class="err">Нет токена в URL. Откройте полную ссылку из Hanni.</div>';
      return;
    }
    const token = m[1];

    const cfg = window.HANNI_FIREBASE_CONFIG;
    if (!cfg || !cfg.projectId || !cfg.apiKey) {
      app.innerHTML = '<div class="err">Cloud-share не настроен (firebase-config.js).</div>';
      return;
    }

    // Pre-populate __SHARE__ with the bare minimum so guest_firestore.js
    // can build URLs. Real metadata comes from Firestore right after.
    window.__SHARE__ = {
      token,
      firestore: { project_id: cfg.projectId, api_key: cfg.apiKey },
    };

    // Fetch share_links/<token> directly via REST (same shape guest_firestore.js
    // would use, but we need the data BEFORE that script loads).
    const metaUrl = `https://firestore.googleapis.com/v1/projects/${encodeURIComponent(cfg.projectId)}`
      + `/databases/(default)/documents/share_links/${encodeURIComponent(token)}`
      + `?key=${encodeURIComponent(cfg.apiKey)}`;
    let doc;
    try {
      const r = await fetch(metaUrl, { credentials: 'omit' });
      if (r.status === 404) {
        app.innerHTML = '<div class="err">Ссылка не найдена. Проверьте URL или перевыпустите ссылку из Hanni.</div>';
        return;
      }
      if (!r.ok) throw new Error('Firestore ' + r.status);
      doc = await r.json();
    } catch (e) {
      app.innerHTML = `<div class="err">Не удалось загрузить ссылку: ${e.message || e}</div>`;
      return;
    }

    // Unwrap Firestore-typed fields → plain JS.
    const f = doc.fields || {};
    const s = (k) => f[k]?.stringValue || null;
    const i = (k) => f[k]?.integerValue ? Number(f[k].integerValue) : null;
    const revoked_at = s('revoked_at');
    if (revoked_at) {
      app.innerHTML = '<div class="err">Ссылка отозвана.</div>';
      return;
    }
    const expires_at = s('expires_at');
    if (expires_at && new Date(expires_at).getTime() < Date.now()) {
      app.innerHTML = '<div class="err">Ссылка истекла.</div>';
      return;
    }
    let permissions = [];
    try { permissions = JSON.parse(s('permissions') || '[]'); } catch {}

    Object.assign(window.__SHARE__, {
      tab: s('tab') || 'food',
      scope: s('scope') || 'all',
      label: s('label') || 'Общий доступ',
      permissions,
      tunnel_url: s('tunnel_url') || null,
    });
    document.title = 'Hanni · ' + window.__SHARE__.label;
    document.getElementById('hdr-title').textContent = window.__SHARE__.label;

    // Now load the same view-modules the axum landing uses. Order matters:
    // guest_firestore exports HanniGuest.firestore, guest.js consumes it.
    const scripts = [
      '/js/guest_firestore.js',
      '/js/guest.js',
      '/js/recipe-shared-ingredients.js',  // BEFORE recipe-shared.js (registers HanniRecipe.ingredients)
      '/js/recipe-shared.js',
      '/js/guest_recipe_add.js',
      '/js/guest_recipes.js',
      '/js/guest_products.js',
      '/js/guest_meal_plan.js',
      '/js/guest_memory.js',
      '/js/fridge-shared.js',
      '/js/guest_fridge.js',
    ];
    for (const src of scripts) {
      await new Promise((resolve, reject) => {
        const tag = document.createElement('script');
        tag.src = src;
        tag.onload = resolve;
        tag.onerror = () => reject(new Error('Failed to load ' + src));
        document.body.appendChild(tag);
      });
    }
  })();
  </script>
</body>
</html>
