<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hanni · общий доступ</title>
  <link rel="stylesheet" href="/css/guest.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">H</div>
  <div>
    <div class="hdr-title" id="hdr-title">Hanni</div>
    <div class="hdr-sub">Hanni · общий доступ (cloud)</div>
  </div>
</header>

<main id="app">
  <div class="empty">Загрузка…</div>
</main>

<footer class="ftr">powered by Hanni · cloud-mirror</footer>

<!-- 1. Web SDK config — generated by scripts/firebase-setup.sh and pasted here -->
<script src="/firebase-config.js"></script>

<!-- 2. Firebase v10 modular CDN bundles (small, ~50 KB gzipped) -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
  import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, addDoc, updateDoc, deleteDoc, setDoc, Timestamp }
    from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';
  import { getAuth, signInAnonymously, signInWithCustomToken }
    from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';

  // 3. Token from URL ?t=…
  const params = new URLSearchParams(location.search);
  const shareToken = params.get('t');
  if (!shareToken) {
    document.getElementById('app').innerHTML =
      '<div class="err">Нет токена в URL. Используйте полную ссылку из Hanni.</div>';
    throw new Error('no token');
  }

  // 4. Init Firebase
  if (!window.HANNI_FIREBASE_CONFIG) {
    document.getElementById('app').innerHTML =
      '<div class="err">firebase-config.js не загружен. Cloud-share не настроен.</div>';
    throw new Error('no config');
  }
  const app = initializeApp(window.HANNI_FIREBASE_CONFIG);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // 5. Sign in anonymously, then trade share_token for a custom JWT via
  //    a Cloud Function (deferred — Stage B). For Stage A read-only access,
  //    rules check `request.auth.token.share_token`. We embed the token
  //    in a stored claim via:
  //      a) initial anon sign-in
  //      b) hosted Cloud Function /mintToken?t=<share_token> returning JWT
  //      c) signInWithCustomToken(jwt)
  //    For now, fall back to anonymous + read-only rules until Cloud Function
  //    is deployed. Hanni-side will be the only writer in Stage A.
  await signInAnonymously(auth);

  // 6. Hand off to the existing guest UI bundle (recipe-shared, fridge-shared)
  //    via a thin bridge that maps api(path, opts) onto Firestore SDK calls.
  window.__HANNI_CLOUD__ = {
    shareToken,
    db, doc, getDoc, getDocs, collection, query, where, orderBy,
    addDoc, updateDoc, deleteDoc, setDoc, Timestamp,
  };
  // Boot the cloud variant of guest.js
  const m = await import('/js/guest-cloud.js');
  m.boot();
</script>

</body>
</html>
