<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#37352f">
  <title>Hanni · общий доступ</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2337352f'/%3E%3Ctext x='50' y='68' font-size='62' text-anchor='middle' font-family='-apple-system,BlinkMacSystemFont,sans-serif' font-weight='700' fill='%23ffffff'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2337352f'/%3E%3Ctext x='50' y='68' font-size='62' text-anchor='middle' font-family='-apple-system' font-weight='700' fill='%23ffffff'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/css/guest.css">
</head>
<body>
  <header class="hdr">
    <div class="hdr-logo">H</div>
    <div>
      <div class="hdr-title" id="hdr-title">Hanni</div>
      <div class="hdr-sub">Hanni · общий доступ</div>
    </div>
  </header>
  <main id="app"><div class="muted">Загрузка…</div></main>
  <footer class="ftr">powered by Hanni · cloud</footer>

  <!-- Static-hosted bootstrap. Firestore project + Web API key are public
       (rules enforce per-token access). Token comes from the URL pathname:
       /s/<token>. The share_links/<token> document gives us scope, perms,
       label, and tunnel_url (where to POST writes when the host is on). -->
  <script src="/firebase-config.js"></script>
  <script>
  (async function () {
    const app = document.getElementById('app');
    const m = location.pathname.match(/\/s\/([A-Za-z0-9_-]{8,64})/);
    if (!m) {
      app.innerHTML = '<div class="err">Нет токена в URL. Откройте полную ссылку из Hanni.</div>';
      return;
    }
    const token = m[1];

    const cfg = window.HANNI_FIREBASE_CONFIG;
    if (!cfg || !cfg.projectId || !cfg.apiKey) {
      app.innerHTML = '<div class="err">Cloud-share не настроен (firebase-config.js).</div>';
      return;
    }

    // Pre-populate __SHARE__ with the bare minimum so guest_firestore.js
    // can build URLs. Real metadata comes from Firestore right after.
    window.__SHARE__ = {
      token,
      firestore: { project_id: cfg.projectId, api_key: cfg.apiKey },
    };

    // Fetch share_links/<token> directly via REST (same shape guest_firestore.js
    // would use, but we need the data BEFORE that script loads).
    // CACHE: per-token meta in localStorage with 1h TTL — keeps repeat visits
    // under the 50k/day Firestore free quota. On 429 we also fall through
    // to a stale cached copy (better stale than broken).
    const META_KEY = 'hg:meta:' + token;
    const META_TTL = 60 * 60 * 1000;
    function loadCachedMeta(maxAge) {
      try {
        const raw = localStorage.getItem(META_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (maxAge !== Infinity && Date.now() - o.t > maxAge) return null;
        return o.v;
      } catch { return null; }
    }
    // Last-known-good tunnel URL (independent of META cache). When the URL
    // baked into ?t= is dead, we try this BEFORE hitting Firestore — keeps
    // repeat visitors off the quota even when Hanni has restarted.
    const TUNNEL_KEY = 'hg:tunnel:' + token;
    const TUNNEL_TTL = 24 * 60 * 60 * 1000;
    function loadCachedTunnel() {
      try {
        const raw = localStorage.getItem(TUNNEL_KEY);
        if (!raw) return null;
        const o = JSON.parse(raw);
        if (Date.now() - o.t > TUNNEL_TTL) return null;
        return o.v;
      } catch { return null; }
    }
    function saveCachedTunnel(url) {
      if (!url) return;
      try { localStorage.setItem(TUNNEL_KEY, JSON.stringify({ t: Date.now(), v: url })); } catch {}
    }
    async function pingTunnel(url) {
      try {
        const r = await fetch(url.replace(/\/+$/, '') + '/share/health',
          { credentials: 'omit', mode: 'cors' });
        return r.ok;
      } catch { return false; }
    }
    function synthDoc(tunnelUrl) {
      return { fields: {
        tab:         { stringValue: qp.get('tab')   || 'food' },
        scope:       { stringValue: qp.get('s')     || 'all'  },
        label:       { stringValue: qp.get('label') || 'Общий доступ' },
        permissions: { stringValue: qp.get('p')     || '["view","add","edit","delete","comment"]' },
        tunnel_url:  { stringValue: tunnelUrl },
      } };
    }
    const metaUrl = `https://firestore.googleapis.com/v1/projects/${encodeURIComponent(cfg.projectId)}`
      + `/databases/(default)/documents/share_links/${encodeURIComponent(token)}`
      + `?key=${encodeURIComponent(cfg.apiKey)}`;
    // QUERY-PARAM OVERRIDE: `?t=<tunnel_url>` lets the host hand-deliver a
    // working link even when Firestore reads are quota-blocked. Anything not
    // in the URL falls back to Firestore (or cache); axum still enforces the
    // real permission set on every write, so optimistic defaults are safe.
    const qp = new URLSearchParams(location.search);
    const tunnelOverride = qp.get('t');
    let doc = loadCachedMeta(META_TTL);
    // Step 1: try the tunnel URL baked into the link (?t=). When it's alive
    // we skip Firestore entirely — that's the whole point of `?t=`.
    if (!doc && tunnelOverride && await pingTunnel(tunnelOverride)) {
      saveCachedTunnel(tunnelOverride);
      doc = synthDoc(tunnelOverride);
    }
    // Step 2: ?t= is dead (or absent) — try the last-known-good tunnel we
    // saved on a previous visit. Keeps repeat visitors off Firestore even
    // after Hanni restarts, as long as another visitor has fetched the
    // fresh URL within the last 24h.
    if (!doc) {
      const cachedTunnel = loadCachedTunnel();
      if (cachedTunnel && cachedTunnel !== tunnelOverride && await pingTunnel(cachedTunnel)) {
        doc = synthDoc(cachedTunnel);
      }
    }
    // Step 3: both URLs dead — read share_links/{token} from Firestore. The
    // mirror loop pushes the live tunnel_url on every Hanni start, so this
    // is the source of truth when local caches miss.
    if (!doc) {
      try {
        const r = await fetch(metaUrl, { credentials: 'omit' });
        if (r.status === 404) {
          app.innerHTML = '<div class="err">Ссылка не найдена. Проверьте URL или перевыпустите ссылку из Hanni.</div>';
          return;
        }
        if (!r.ok) throw new Error('Firestore ' + r.status);
        doc = await r.json();
        try { localStorage.setItem(META_KEY, JSON.stringify({ t: Date.now(), v: doc })); } catch {}
        saveCachedTunnel(doc.fields?.tunnel_url?.stringValue);
      } catch (e) {
        // 429 / network error → try stale cache; only then bail.
        const stale = loadCachedMeta(Infinity);
        if (stale) { doc = stale; }
        else {
          app.innerHTML = `<div class="err">Не удалось загрузить ссылку: ${e.message || e}<br><small>Подсказка: попроси хозяина ссылки сгенерировать новую — она будет содержать токен туннеля и заработает в обход квоты.</small></div>`;
          return;
        }
      }
    }

    // Unwrap Firestore-typed fields → plain JS.
    const f = doc.fields || {};
    const s = (k) => f[k]?.stringValue || null;
    const i = (k) => f[k]?.integerValue ? Number(f[k].integerValue) : null;
    const revoked_at = s('revoked_at');
    if (revoked_at) {
      app.innerHTML = '<div class="err">Ссылка отозвана.</div>';
      return;
    }
    const expires_at = s('expires_at');
    if (expires_at && new Date(expires_at).getTime() < Date.now()) {
      app.innerHTML = '<div class="err">Ссылка истекла.</div>';
      return;
    }
    let permissions = [];
    try { permissions = JSON.parse(s('permissions') || '[]'); } catch {}

    Object.assign(window.__SHARE__, {
      tab: s('tab') || 'food',
      scope: s('scope') || 'all',
      label: s('label') || 'Общий доступ',
      permissions,
      tunnel_url: s('tunnel_url') || null,
    });
    document.title = 'Hanni · ' + window.__SHARE__.label;
    document.getElementById('hdr-title').textContent = window.__SHARE__.label;

    // Now load the same view-modules the axum landing uses. Order matters:
    // guest_firestore exports HanniGuest.firestore, guest.js consumes it.
    const scripts = [
      '/js/guest_firestore.js',
      '/js/guest.js',
      '/js/recipe-shared-ingredients.js',  // BEFORE recipe-shared.js (registers HanniRecipe.ingredients)
      '/js/recipe-shared-steps.js',        // BEFORE recipe-shared.js (registers HanniRecipe.steps)
      '/js/recipe-shared-image.js',        // BEFORE recipe-shared.js (registers HanniRecipe.image)
      '/js/recipe-shared.js',
      '/js/guest_recipe_add.js',
      '/js/guest_recipes.js',
      '/js/guest_products.js',
      '/js/guest_meal_plan.js',
      '/js/guest_memory.js',
      '/js/fridge-shared.js',
      '/js/guest_fridge.js',
    ];
    // Cache-bust: every deploy bumps this so the CDN's 5-min edge cache
    // doesn't pin gust-* modules to an old build (which silently breaks
    // the post-load render trigger below).
    const V = '20260524f';
    for (const src of scripts) {
      await new Promise((resolve, reject) => {
        const tag = document.createElement('script');
        tag.src = src + '?v=' + V;
        tag.onload = resolve;
        tag.onerror = () => reject(new Error('Failed to load ' + src));
        document.body.appendChild(tag);
      });
    }
    // DOMContentLoaded fired long before view-modules registered (dynamic
    // appendChild), so guest.js's auto-mount missed them. Trigger now.
    window.HanniGuest?.renderShell?.();
  })();
  </script>
</body>
</html>
